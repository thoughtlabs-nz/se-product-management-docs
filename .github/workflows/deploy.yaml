name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main  # Change to your default branch if different

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      deployments: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # or your preferred version
      
      - name: Install Mint
        run: npm install -g @mint-lang/mint
     
      - name: Validate Documents
        run: mint validate      

      - name: Export site with Mint
        run: mint export
      
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: se-product-management-docs  # Your Cloudflare Pages project name
          directory: export  # Output directory from mint export
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
