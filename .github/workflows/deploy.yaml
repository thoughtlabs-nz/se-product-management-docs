name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install Mint
        run: npm install -g mint
      
      - name: Validate Documents
        run: mint validate
      
      - name: Export site with Mint
        run: mint export
      
      - name: Unzip export
        run: |
          unzip -o export.zip -d .
          rm export.zip
      
      - name: Commit export directory
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add export/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update exported site [skip ci]"
          git push
  
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: se-product-management-docs
          directory: export
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
