name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Install Mint
        run: npm install -g mint
      
      - name: Validate Documents
        run: mint validate
      
      - name: Export site with Mint
        run: mint export
      
      - name: Unzip and verify export
        run: |
          echo "Listing files before unzip:"
          ls -la
          
          if [ -f export.zip ]; then
            echo "Unzipping export.zip..."
            unzip -o export.zip
            echo "Contents after unzip:"
            ls -la
            
            # Check if export directory exists, if not, the zip might extract differently
            if [ ! -d "export" ]; then
              echo "export/ directory not found. Listing all directories:"
              find . -type d -maxdepth 2
            fi
            
            rm export.zip
          else
            echo "ERROR: export.zip not found!"
            exit 1
          fi
      
      - name: Commit export directory
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Only add if export directory exists
          if [ -d "export" ]; then
            git add export/
            git diff --quiet && git diff --staged --quiet || git commit -m "Update exported site [skip ci]"
            git push
          else
            echo "ERROR: export/ directory not found after unzip"
            exit 1
          fi
  
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      deployments: write
    
    steps:

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: se-product-management-docs
          directory: export
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
